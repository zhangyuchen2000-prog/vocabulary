<head>

  <title>Daily Five — Vocabulary Practice</title>
      <style>
:root {
  --paper: #f4f0e8;
  --ink: #1f2522;
  --muted: #68706b;
  --line: rgba(31, 37, 34, 0.13);
  --card: rgba(255, 255, 255, 0.76);
  --accent: #315f4b;
  --accent-soft: #dce9e1;
  --shadow: 0 18px 50px rgba(31, 37, 34, 0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  color: var(--ink);
  background:
    radial-gradient(circle at 10% 5%, rgba(255,255,255,.9), transparent 30%),
    linear-gradient(135deg, #f7f4ed 0%, #ece7dc 100%);
  font-family: "DM Sans", system-ui, sans-serif;
  min-height: 100vh;
}

button, input { font: inherit; }

.shell {
  width: min(1120px, calc(100% - 32px));
  margin: 0 auto;
  padding: 48px 0 36px;
}

.topbar,
.intro,
footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: .74rem;
  font-weight: 600;
  letter-spacing: .18em;
}

h1 {
  margin: 0;
  font-family: "Playfair Display", serif;
  font-size: clamp(2.7rem, 7vw, 5.4rem);
  line-height: .95;
  letter-spacing: -.04em;
}

.date-card {
  text-align: right;
  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255,255,255,.45);
  backdrop-filter: blur(12px);
}

.date-card span,
.date-card strong {
  display: block;
}

.date-card > span {
  color: var(--muted);
  font-size: .9rem;
  margin-bottom: 5px;
}

.intro {
  margin: 34px 0 24px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}

.intro p {
  max-width: 630px;
  margin: 0;
  color: var(--muted);
  line-height: 1.7;
}

.secondary,
.reveal {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  border-radius: 999px;
  cursor: pointer;
  transition: .2s ease;
}

.secondary {
  padding: 11px 17px;
  white-space: nowrap;
}

.secondary:hover,
.reveal:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
}

.word-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 18px;
}

.word-card {
  grid-column: span 4;
  min-height: 310px;
  display: flex;
  flex-direction: column;
  padding: 24px;
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 24px;
  background: var(--card);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.word-card:nth-child(4),
.word-card:nth-child(5) {
  grid-column: span 6;
}

.card-top {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: .1em;
}

.word-card h2 {
  margin: 34px 0 18px;
  font-family: "Playfair Display", serif;
  font-size: clamp(2rem, 4vw, 3rem);
  letter-spacing: -.025em;
}

.reveal {
  width: fit-content;
  padding: 8px 12px;
  font-size: .86rem;
}

.details {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}

.definition {
  margin: 0 0 12px;
  font-weight: 600;
  line-height: 1.5;
}

.example {
  margin: 0;
  color: var(--muted);
  font-style: italic;
  line-height: 1.6;
}

.learned-row {
  margin-top: auto;
  padding-top: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  color: var(--muted);
}

.learned-row input {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 1px solid #9ca39f;
  border-radius: 6px;
  display: grid;
  place-items: center;
  cursor: pointer;
}

.learned-row input:checked {
  background: var(--accent);
  border-color: var(--accent);
}

.learned-row input:checked::after {
  content: "✓";
  color: white;
  font-size: 14px;
}

.word-card.complete {
  background: linear-gradient(145deg, rgba(255,255,255,.84), var(--accent-soft));
}

footer {
  margin-top: 24px;
  color: var(--muted);
  font-size: .86rem;
}

.text-button {
  border: 0;
  background: none;
  color: var(--muted);
  text-decoration: underline;

  <script>
const WORDS_PER_DAY = 5;
const words = window.VOCAB_WORDS;

const dateKey = new Date().toISOString().slice(0, 10);
const progressKey = `daily-five-progress-${dateKey}`;
const seenKey = `daily-five-seen-${dateKey}`;
const batchKey = `daily-five-batch-${dateKey}`;

const dateLabel = document.querySelector("#dateLabel");
const learnedCount = document.querySelector("#learnedCount");
const grid = document.querySelector("#wordGrid");
const template = document.querySelector("#wordCardTemplate");
const shuffleButton = document.querySelector("#shuffleButton");
const resetButton = document.querySelector("#resetButton");
const newBatchButton = document.querySelector("#newBatchButton");

dateLabel.textContent = new Intl.DateTimeFormat("en-NZ", {
  weekday: "long",
  day: "numeric",
  month: "long"
}).format(new Date());

function hashString(value) {
  let hash = 2166136261;
  for (let i = 0; i < value.length; i++) {
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function seededRandom(seed) {
  let state = seed >>> 0;
  return function () {
    state += 0x6D2B79F5;
    let t = state;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function seededShuffle(items, seedText) {
  const result = [...items];
  const random = seededRandom(hashString(seedText));
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function getStoredBatch() {
  try {
    const stored = JSON.parse(localStorage.getItem(batchKey));
    if (Array.isArray(stored) && stored.length === WORDS_PER_DAY) {
      const restored = stored
        .map(wordText => words.find(item => item.word === wordText))
        .filter(Boolean);
      if (restored.length === WORDS_PER_DAY) return restored;
    }
  } catch {}
  const firstBatch = seededShuffle(words, dateKey).slice(0, WORDS_PER_DAY);
  localStorage.setItem(batchKey, JSON.stringify(firstBatch.map(item => item.word)));
  localStorage.setItem(seenKey, JSON.stringify(firstBatch.map(item => item.word)));
  return firstBatch;
}

let dailyWords = getStoredBatch();
let displayWords = [...dailyWords];

function readProgress() {
  try {
    return JSON.parse(localStorage.getItem(progressKey)) || {};
  } catch {
    return {};
  }
}

function writeProgress(progress) {
  localStorage.setItem(progressKey, JSON.stringify(progress));
}

function refreshCount() {
  const progress = readProgress();
  const count = dailyWords.filter(item => progress[item.word]).length;
  learnedCount.textContent = count;
}

function render() {
  const progress = readProgress();
  grid.innerHTML = "";

  displayWords.forEach((item, index) => {
    const fragment = template.content.cloneNode(true);
    const card = fragment.querySelector(".word-card");
    const reveal = fragment.querySelector(".reveal");
    const details = fragment.querySelector(".details");
    const checkbox = fragment.querySelector(".learned");

    fragment.querySelector(".number").textContent = String(index + 1).padStart(2, "0");
    fragment.querySelector(".part").textContent = item.pos;
    fragment.querySelector(".word").textContent = item.word;
    fragment.querySelector(".definition").textContent = item.definition;
    fragment.querySelector(".example").textContent = `“${item.example}”`;

    checkbox.checked = Boolean(progress[item.word]);
    card.classList.toggle("complete", checkbox.checked);

    reveal.addEventListener("click", () => {
      const isHidden = details.hidden;
      details.hidden = !isHidden;
      reveal.textContent = isHidden ? "Hide meaning" : "Reveal meaning";
    });

    checkbox.addEventListener("change", () => {
      const next = readProgress();
      next[item.word] = checkbox.checked;
      writeProgress(next);
      card.classList.toggle("complete", checkbox.checked);
      refreshCount();
    });

    grid.appendChild(fragment);
  });

  refreshCount();
}

function loadNewBatch() {
  let seen = [];
  try {
    seen = JSON.parse(localStorage.getItem(seenKey)) || [];
  } catch {}

  let remaining = words.filter(item => !seen.includes(item.word));

  if (remaining.length < WORDS_PER_DAY) {
    seen = [];
    remaining = [...words];
  }

  const nextBatch = seededShuffle(
    remaining,
    `${dateKey}-${Date.now()}-${Math.random()}`
  ).slice(0, WORDS_PER_DAY);

  dailyWords = nextBatch;
  displayWords = [...nextBatch];

  const updatedSeen = [...new Set([...seen, ...nextBatch.map(item => item.word)])];
  localStorage.setItem(seenKey, JSON.stringify(updatedSeen));
  localStorage.setItem(batchKey, JSON.stringify(nextBatch.map(item => item.word)));

  render();
}

shuffleButton.addEventListener("click", () => {
  displayWords = seededShuffle(displayWords, `${Date.now()}-${Math.random()}`);
  render();
});

newBatchButton.addEventListener("click", loadNewBatch);

resetButton.addEventListener("click", () => {
  localStorage.removeItem(progressKey);
  render();
});

render();

  </script>
</body>
</html>
